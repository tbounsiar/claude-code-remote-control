name: Build Android

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Verify prebuild output
        run: |
          test -f android/app/build.gradle || { echo "ERROR: expo prebuild failed"; exit 1; }

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          test -s android/app/release.keystore || (echo "ERROR: keystore decode failed" && exit 1)

      - name: Configure release signing
        run: |
          cat > /tmp/signing-patch.py << 'PYEOF'
          path = "android/app/build.gradle"
          with open(path) as f:
              content = f.read()

          release_config = """
          release {
              storeFile file('release.keystore')
              storePassword System.getenv('KEYSTORE_PASSWORD') ?: ''
              keyAlias System.getenv('KEY_ALIAS') ?: ''
              keyPassword System.getenv('KEY_PASSWORD') ?: ''
          }"""

          content = content.replace(
              "        }\n    }\n    buildTypes {",
              "        }\n" + release_config + "\n    }\n    buildTypes {"
          )

          content = content.replace(
              "signingConfig signingConfigs.debug\n            def enableShrinkResources",
              "signingConfig signingConfigs.release\n            def enableShrinkResources"
          )

          with open(path, 'w') as f:
              f.write(content)
          PYEOF
          python3 /tmp/signing-patch.py
          # Verify the patch was applied
          grep -q 'signingConfigs.release' android/app/build.gradle || (echo "ERROR: signing patch failed — build.gradle not patched" && exit 1)
          echo "Signing config patched and verified"

      - name: Build release AAB
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename artifacts
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          cp android/app/build/outputs/bundle/release/app-release.aab claude-code-remote-control-${TAG}.aab
          cp android/app/build/outputs/apk/release/app-release.apk claude-code-remote-control-${TAG}.apk

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # Delete existing release if re-running on same tag
          gh release delete ${TAG} --yes 2>/dev/null || true
          gh release create ${TAG} \
            claude-code-remote-control-${TAG}.apk \
            claude-code-remote-control-${TAG}.aab \
            --title "${TAG} - Release" \
            --generate-notes
